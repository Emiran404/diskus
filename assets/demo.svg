<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="Menlo, Consolas, 'DejaVu Sans Mono', monospace" font-size="14">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1b26"/>
      <stop offset="1" stop-color="#16161e"/>
    </linearGradient>
  </defs>

  <!-- terminal window -->
  <rect x="4" y="4" width="752" height="452" rx="12" fill="url(#bg)" stroke="#2f334d" stroke-width="1"/>

  <!-- title bar -->
  <circle cx="28" cy="28" r="7" fill="#ff5f57"/>
  <circle cx="50" cy="28" r="7" fill="#febc2e"/>
  <circle cx="72" cy="28" r="7" fill="#28c840"/>
  <text x="380" y="33" text-anchor="middle" fill="#565f89" font-size="12">diskus — ~/Downloads</text>

  <!-- prompt -->
  <text x="28" y="72" fill="#50FA7B">❯</text>
  <text x="46" y="72" fill="#c0caf5">diskus --top 8 ~/Downloads</text>

  <!-- header -->
  <text x="28" y="108" fill="#7D56F4" font-weight="bold">📁 /Users/emirhan/Downloads</text>

  <!-- rows: name | bar | size | pct -->
  <g>
    <text x="46" y="140" fill="#565f89">├─</text>
    <text x="74" y="140" fill="#00BFFF" font-weight="bold">videos/</text>
    <text x="250" y="140" fill="#7D56F4">██████████████░░░░░░</text>
    <text x="490" y="140" fill="#FFA500" font-weight="bold" text-anchor="end" xml:space="preserve">   4.2 GB</text>
    <text x="560" y="140" fill="#565f89" text-anchor="end">68.1%</text>
  </g>
  <g>
    <text x="46" y="168" fill="#565f89">├─</text>
    <text x="74" y="168" fill="#00BFFF" font-weight="bold">archives/</text>
    <text x="250" y="168" fill="#7D56F4">█████░░░░░░░░░░░░░░░</text>
    <text x="490" y="168" fill="#FFA500" font-weight="bold" text-anchor="end" xml:space="preserve">   1.4 GB</text>
    <text x="560" y="168" fill="#565f89" text-anchor="end">22.7%</text>
  </g>
  <g>
    <text x="46" y="196" fill="#565f89">├─</text>
    <text x="74" y="196" fill="#00BFFF" font-weight="bold">images/</text>
    <text x="250" y="196" fill="#7D56F4">█░░░░░░░░░░░░░░░░░░░</text>
    <text x="490" y="196" fill="#FFA500" font-weight="bold" text-anchor="end">380.2 MB</text>
    <text x="560" y="196" fill="#565f89" text-anchor="end">6.0%</text>
  </g>
  <g>
    <text x="46" y="224" fill="#565f89">├─</text>
    <text x="74" y="224" fill="#00BFFF" font-weight="bold">documents/</text>
    <text x="250" y="224" fill="#7D56F4">░░░░░░░░░░░░░░░░░░░░</text>
    <text x="490" y="224" fill="#FFA500" font-weight="bold" text-anchor="end">190 MB</text>
    <text x="560" y="224" fill="#565f89" text-anchor="end">3.1%</text>
  </g>
  <g>
    <text x="46" y="252" fill="#565f89">├─</text>
    <text x="74" y="252" fill="#c0caf5">ubuntu-24.04.iso</text>
    <text x="250" y="252" fill="#7D56F4">░░░░░░░░░░░░░░░░░░░░</text>
    <text x="490" y="252" fill="#FFA500" font-weight="bold" text-anchor="end">102.3 MB</text>
    <text x="560" y="252" fill="#565f89" text-anchor="end">1.6%</text>
  </g>
  <g>
    <text x="46" y="280" fill="#565f89">└─</text>
    <text x="74" y="280" fill="#c0caf5">podcast.mp3</text>
    <text x="250" y="280" fill="#7D56F4">░░░░░░░░░░░░░░░░░░░░</text>
    <text x="490" y="280" fill="#FFA500" font-weight="bold" text-anchor="end"> 48.1 MB</text>
    <text x="560" y="280" fill="#565f89" text-anchor="end">0.8%</text>
  </g>
  <text x="74" y="308" fill="#565f89">… +12 more items</text>

  <!-- total -->
  <text x="46" y="348" fill="#50FA7B" font-weight="bold">Total:</text>
  <text x="110" y="348" fill="#FFA500" font-weight="bold">6.1 GB</text>
  <text x="185" y="348" fill="#565f89">(12,480 files)</text>

  <!-- second prompt with type breakdown teaser -->
  <text x="28" y="392" fill="#50FA7B">❯</text>
  <text x="46" y="392" fill="#c0caf5">diskus --types --top 3 ~/Downloads</text>
  <text x="28" y="424" fill="#7D56F4" font-weight="bold">📊 file type breakdown</text>
  <text x="360" y="424" fill="#565f89">.mp4 62%  ·  .zip 19%  ·  .png 8%</text>
</svg>
